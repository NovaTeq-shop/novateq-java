name: Build & Push Docker Image
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/novateq-shop/novateq-java:latest

      - name: Build and push installer image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.installer
          push: true
          tags: ghcr.io/novateq-shop/novateq-java:installer
